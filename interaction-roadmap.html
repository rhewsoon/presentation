<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>인터랙션 로드맵 2026</title>
  <style>
    /* ── Design tokens — matches 2026-design-trends palette ── */
    :root {
      --bg:           #070a10;
      --bg-surface:   #0e141e;
      --bg-elevated:  #131b27;
      --card-edge:    rgba(255,255,255,0.11);
      --text:         #eef3f8;
      --muted:        #94a8bd;
      --accent:       #6eb8e8;
      --accent-soft:  rgba(110,184,232,0.2);
      --shadow:       0 8px 32px rgba(0,0,0,0.45);
      --radius:       14px;
      --radius-sm:    9px;

      /* Status */
      --done:         #7dd3a8;
      --done-bg:      rgba(125,211,168,0.14);
      --progress:     #6eb8e8;
      --progress-bg:  rgba(110,184,232,0.14);
      --planned:      #94a8bd;
      --planned-bg:   rgba(148,168,189,0.1);

      /* Layout */
      --sidebar-w:    210px;
      --col-w:        80px;
      --row-h:        100px;
      --ruler-h:      54px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Page layout ── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      height: 64px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      background: var(--bg-surface);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      z-index: 30;
      gap: 1rem;
    }

    .header-left { display: flex; align-items: center; gap: 0.85rem; }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.32rem;
      padding: 0.22rem 0.62rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #b8d9f5;
      background: linear-gradient(135deg, rgba(110,184,232,0.22), rgba(167,139,250,0.14));
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 999px;
      white-space: nowrap;
    }

    .header-badge::before {
      content: "";
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--done);
      box-shadow: 0 0 0 3px rgba(125,211,168,0.22);
    }

    .page-title {
      margin: 0;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #fff;
    }
    .page-title .accent { color: var(--accent); }

    .header-legend {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    @media (max-width: 768px) { .header-legend { display: none; } }

    /* ── Filter bar ── */
    .filter-bar {
      height: 50px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0 1.25rem;
      background: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filter-sep {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.1);
      flex-shrink: 0;
      margin: 0 0.25rem;
    }

    .filter-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font: inherit;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.25rem 0.62rem;
      border-radius: 7px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.14s, color 0.14s, border-color 0.14s;
      display: inline-flex;
      align-items: center;
      gap: 0.28rem;
      flex-shrink: 0;
    }

    .filter-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .filter-btn.active { color: var(--text); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.09); }

    .fdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* ── Roadmap body ── */
    .roadmap-body {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sidebar ── */
    .roadmap-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-right: 1px solid rgba(255,255,255,0.07);
      z-index: 10;
      overflow: hidden;
    }

    .sidebar-corner {
      height: var(--ruler-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 1rem 0 1.1rem;
      background: var(--bg-surface);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .year-badge {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    .sidebar-rows {
      overflow: hidden;
      flex: 1;
    }

    .project-label {
      height: var(--row-h);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 2.2rem 0 1.1rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.14s;
      position: relative;
      user-select: none;
    }

    .project-label:hover { background: rgba(255,255,255,0.025); }
    .project-label.collapsed { opacity: 0.5; }

    .proj-color-bar {
      position: absolute;
      left: 0;
      top: 18px;
      bottom: 18px;
      width: 3px;
      border-radius: 2px;
    }

    .proj-name {
      font-size: 0.84rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 0.18rem;
    }

    .proj-meta { font-size: 0.64rem; color: var(--muted); line-height: 1.4; }

    .proj-chevron {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      transition: transform 0.2s;
      pointer-events: none;
    }

    .project-label.collapsed .proj-chevron { transform: translateY(-50%) rotate(-90deg); }

    /* ── Timeline scroll ── */
    .timeline-scroll {
      flex: 1;
      overflow: auto;
      min-width: 0;
    }

    .timeline-scroll::-webkit-scrollbar { height: 5px; width: 5px; }
    .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
    .timeline-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .timeline-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

    .timeline-inner {
      width: calc(var(--col-w) * 12);
      min-width: 100%;
      position: relative;
    }

    /* ── Ruler ── */
    .timeline-ruler {
      height: var(--ruler-h);
      position: sticky;
      top: 0;
      z-index: 15;
      background: var(--bg-surface);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .ruler-quarters {
      display: flex;
      height: 22px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .ruler-quarter {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent);
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .ruler-quarter:last-child { border-right: none; }

    .ruler-months { display: flex; height: 32px; }

    .ruler-month {
      width: var(--col-w);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted);
      border-right: 1px solid rgba(255,255,255,0.04);
    }

    .ruler-month.now { color: var(--accent); font-weight: 700; }

    /* ── Timeline rows container ── */
    .timeline-rows { position: relative; }

    .timeline-row {
      height: var(--row-h);
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: height 0.25s cubic-bezier(0.22,1,0.36,1), opacity 0.2s;
      overflow: hidden;
    }

    .timeline-row.collapsed { height: 0 !important; opacity: 0; pointer-events: none; }

    /* Quarter dividers via background */
    .timeline-rows::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent calc(var(--col-w) * 3 - 1px),
        rgba(255,255,255,0.03) calc(var(--col-w) * 3 - 1px),
        rgba(255,255,255,0.03) calc(var(--col-w) * 3)
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle alternating row bg */
    .timeline-row:nth-child(odd)  { background: transparent; }
    .timeline-row:nth-child(even) { background: rgba(255,255,255,0.008); }

    /* Month column lines via row */
    .timeline-row::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent calc(var(--col-w) - 1px),
        rgba(255,255,255,0.018) calc(var(--col-w) - 1px),
        rgba(255,255,255,0.018) var(--col-w)
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── Phase blocks ── */
    .phase-block {
      position: absolute;
      top: 12px;
      height: calc(var(--row-h) - 24px);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.15s, opacity 0.18s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 2;
      min-width: 30px;
    }

    .phase-block:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.45);
      border-color: rgba(255,255,255,0.22) !important;
      z-index: 5;
    }

    .phase-block:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .phase-block.active {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 2px var(--accent-soft), 0 6px 20px rgba(0,0,0,0.45) !important;
      z-index: 6;
    }

    /* Phase color tints */
    .phase-block[data-phase="research"]  { background: linear-gradient(145deg, rgba(167,139,250,0.22), rgba(167,139,250,0.07)); border-color: rgba(167,139,250,0.32); }
    .phase-block[data-phase="wireframe"] { background: linear-gradient(145deg, rgba(110,184,232,0.22), rgba(110,184,232,0.07)); border-color: rgba(110,184,232,0.32); }
    .phase-block[data-phase="prototype"] { background: linear-gradient(145deg, rgba(249,168,212,0.22), rgba(249,168,212,0.07)); border-color: rgba(249,168,212,0.32); }
    .phase-block[data-phase="qa"]        { background: linear-gradient(145deg, rgba(252,211,77,0.22),  rgba(252,211,77,0.07));  border-color: rgba(252,211,77,0.32); }
    .phase-block[data-phase="launch"]    { background: linear-gradient(145deg, rgba(125,211,168,0.22), rgba(125,211,168,0.07)); border-color: rgba(125,211,168,0.32); }

    .phase-block.dim { opacity: 0.15 !important; pointer-events: none; transform: none !important; }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 0.32rem;
      padding: 0.32rem 0.55rem 0.2rem;
      flex-shrink: 0;
    }

    .phase-name {
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .phase-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .phase-dot[data-status="done"]        { background: var(--done); }
    .phase-dot[data-status="in-progress"] { background: var(--progress); animation: blink 2s ease-in-out infinite; }
    .phase-dot[data-status="planned"]     { background: var(--planned); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .phase-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem;
      padding: 0 0.5rem 0.35rem;
      overflow: hidden;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 0.1rem 0.4rem;
      font-size: 0.57rem;
      font-weight: 600;
      border-radius: 999px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Today line ── */
    .today-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, var(--accent) 0%, rgba(110,184,232,0.12) 100%);
      z-index: 8;
      pointer-events: none;
    }

    .today-tag {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.5rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      color: var(--accent);
      background: var(--bg-elevated);
      border: 1px solid rgba(110,184,232,0.38);
      border-radius: 3px;
      padding: 0.1rem 0.28rem;
      white-space: nowrap;
    }

    /* ── SVG connections ── */
    .conn-svg {
      position: absolute;
      top: 0; left: 0;
      overflow: visible;
      pointer-events: none;
      z-index: 1;
    }

    .conn-path {
      fill: none;
      stroke: rgba(110,184,232,0.22);
      stroke-width: 1.5;
      stroke-dasharray: 5,3;
      transition: stroke 0.2s, stroke-width 0.2s, stroke-dasharray 0.15s;
    }

    .conn-path.hi {
      stroke: rgba(110,184,232,0.75);
      stroke-width: 2;
      stroke-dasharray: none;
    }

    .conn-dot {
      fill: rgba(110,184,232,0.4);
      transition: fill 0.2s, r 0.2s;
    }

    .conn-dot.hi { fill: rgba(110,184,232,0.9); }

    /* ── Tooltip ── */
    .tooltip {
      position: fixed;
      z-index: 200;
      pointer-events: none;
      max-width: 230px;
      background: var(--bg-elevated);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: var(--radius-sm);
      padding: 0.65rem 0.8rem;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(6px) scale(0.97);
      transition: opacity 0.14s, transform 0.14s;
    }

    .tooltip.show { opacity: 1; transform: none; }

    .tt-phase {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 0.22rem;
    }

    .tt-proj { font-size: 0.78rem; font-weight: 700; color: #fff; margin-bottom: 0.08rem; }
    .tt-period { font-size: 0.62rem; color: var(--muted); margin-bottom: 0.36rem; }

    .tt-dels { display: flex; flex-direction: column; gap: 0.16rem; }

    .tt-del {
      font-size: 0.64rem;
      color: #c0d0df;
      display: flex;
      align-items: center;
      gap: 0.28rem;
    }

    .tt-del::before {
      content: "";
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .tt-owner {
      margin-top: 0.38rem;
      padding-top: 0.32rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.62rem;
      color: var(--muted);
    }

    /* ── Side panel ── */
    .side-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(360px, 90vw);
      background: var(--bg-elevated);
      border-left: 1px solid rgba(255,255,255,0.09);
      z-index: 80;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
      display: flex;
      flex-direction: column;
      box-shadow: -12px 0 52px rgba(0,0,0,0.5);
    }

    .side-panel.open { transform: translateX(0); }

    .panel-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1rem 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
      gap: 0.75rem;
    }

    .panel-phase-tag {
      display: inline-flex;
      align-items: center;
      padding: 0.22rem 0.62rem;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 999px;
      border: 1px solid;
    }

    .panel-close {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      font: inherit;
      font-size: 1rem;
      width: 30px; height: 30px;
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.14s, color 0.14s;
    }

    .panel-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .panel-bd {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .panel-bd::-webkit-scrollbar { width: 4px; }
    .panel-bd::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .panel-proj { margin: 0 0 0.15rem; font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .panel-period { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.8rem; }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.28rem;
      padding: 0.22rem 0.58rem;
      font-size: 0.66rem;
      font-weight: 700;
      border-radius: 999px;
      border: 1px solid;
      margin-bottom: 1rem;
    }

    .status-chip::before { content: ""; width: 4px; height: 4px; border-radius: 50%; background: currentColor; }
    .status-chip.done     { color: var(--done);     border-color: rgba(125,211,168,0.3); background: var(--done-bg); }
    .status-chip.progress { color: var(--progress); border-color: rgba(110,184,232,0.3); background: var(--progress-bg); }
    .status-chip.planned  { color: var(--planned);  border-color: rgba(148,168,189,0.22); background: var(--planned-bg); }

    .section-ttl {
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.5rem;
    }

    .del-list { display: flex; flex-direction: column; gap: 0.38rem; margin-bottom: 1.1rem; }

    .del-item {
      display: flex;
      align-items: flex-start;
      gap: 0.52rem;
      padding: 0.52rem 0.7rem;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .del-ico {
      width: 20px; height: 20px;
      border-radius: 5px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.64rem;
      font-weight: 800;
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 0.05rem;
    }

    .del-name { font-size: 0.78rem; font-weight: 600; color: #fff; line-height: 1.3; }
    .del-desc { font-size: 0.68rem; color: var(--muted); line-height: 1.4; margin-top: 0.1rem; }

    .assignee-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.7rem;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 1.1rem;
      font-size: 0.78rem;
      color: var(--text);
    }

    .av {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(110,184,232,0.45), rgba(167,139,250,0.35));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .conn-item {
      display: flex;
      align-items: flex-start;
      gap: 0.52rem;
      padding: 0.48rem 0.7rem;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(110,184,232,0.14);

    }

    .conn-dir {

      .proj-meta { display: none; }
      .phase-pills { display: none; }
    }
  </style>
</head>

            ]

          { key: 'prototype', start: 4, end: 7,  status: 'in-progress', assignee: '강시스템',
            deliverables: [

            ]
          },
          { key: 'launch',    start: 8, end: 11, status: 'planned',     assignee: '전팀',

      { from: { proj: 'proj-d', phase: 'prototype' }, to: { proj: 'proj-a', phase: 'prototype' }, label: 'Figma 라이브러리 활용' },
      { from: { proj: 'proj-a', phase: 'wireframe' }, to: { proj: 'proj-b', phase: 'wireframe' }, label: '인터랙션 패턴 공유' }
    ];

    /* ══ State ══════════════════════════════════════════════════ */
    var filter      = { phase: 'all', status: 'all' };
    var collapsed   = {};   /* projId → boolean */

    /* ══ DOM refs ═══════════════════════════════════════════════ */
    var sidebarRowsEl  = document.getElementById('sidebarRows');
    var timelineScrollEl = document.getElementById('timelineScroll');
    var timelineRowsEl = document.getElementById('timelineRows');
    var connSvgEl      = document.getElementById('connSvg');
    var tooltipEl      = document.getElementById('tooltip');
    var sidePanelEl    = document.getElementById('sidePanel');
    var backdropEl     = document.getElementById('backdrop');
    var panelTagEl     = document.getElementById('panelTag');
    var panelBodyEl    = document.getElementById('panelBody');

    /* ══ Build ruler ════════════════════════════════════════════ */
    function buildRuler() {
      var qEl = document.getElementById('rulerQuarters');
      var mEl = document.getElementById('rulerMonths');
      var quarters = ['Q1 · 1분기','Q2 · 2분기','Q3 · 3분기','Q4 · 4분기'];
      qEl.innerHTML = quarters.map(function (q) {
        return '<div class="ruler-quarter">' + q + '</div>';
      }).join('');
      var nowM = new Date().getMonth();
      mEl.innerHTML = MONTHS.map(function (m, i) {
        return '<div class="ruler-month' + (i === nowM ? ' now' : '') + '">' + m + '</div>';
      }).join('');
    }

    /* ══ Build sidebar labels ═══════════════════════════════════ */
    function buildSidebar() {
      sidebarRowsEl.innerHTML = projects.map(function (p, i) {
        return [
          '<div class="project-label" id="lbl-' + p.id + '" data-proj="' + p.id + '">',
          '  <div class="proj-color-bar" style="background:' + PROJ_COLORS[i % PROJ_COLORS.length] + '"></div>',
          '  <div class="proj-name">' + p.name + '</div>',
          '  <div class="proj-meta">' + p.team + ' &middot; ' + p.phases.length + '단계</div>',
          '  <span class="proj-chevron">&#x2304;</span>',
          '</div>'
        ].join('');
      }).join('');

      sidebarRowsEl.addEventListener('click', function (e) {
        var lbl = e.target.closest('.project-label');
        if (lbl) toggleRow(lbl.dataset.proj);
      });
    }

    /* ══ Build timeline rows ════════════════════════════════════ */
    function buildRows() {
      var html = '';
      projects.forEach(function (proj) {
        html += '<div class="timeline-row" id="row-' + proj.id + '">';
        proj.phases.forEach(function (phase) {
          var left  = phase.start * COL_W + 3;
          var width = (phase.end - phase.start) * COL_W - 6;
          var pills = phase.deliverables.slice(0, 2).map(function (d) {
            return '<span class="pill">' + d.name + '</span>';
          });
          if (phase.deliverables.length > 2) {
            pills.push('<span class="pill">+' + (phase.deliverables.length - 2) + '</span>');
          }
          html += [
            '<div class="phase-block"',
            '  data-proj="' + proj.id + '"',
            '  data-phase="' + phase.key + '"',
            '  data-status="' + phase.status + '"',
            '  style="left:' + left + 'px;width:' + width + 'px"',
            '  tabindex="0"',
            '>',
            '  <div class="phase-header">',
            '    <span class="phase-name">' + PHASE_META[phase.key].label + '</span>',
            '    <span class="phase-dot" data-status="' + phase.status + '"></span>',
            '  </div>',
            '  <div class="phase-pills">' + pills.join('') + '</div>',
            '</div>'
          ].join('');
        });
        html += '</div>';
      });
      connSvgEl.insertAdjacentHTML('afterend', html);
    }

    /* ══ Today line ═════════════════════════════════════════════ */
    function buildTodayLine() {
      var now        = new Date();
      var m          = now.getMonth();
      var d          = now.getDate();
      var daysInM    = new Date(now.getFullYear(), m + 1, 0).getDate();
      var leftPx     = (m + d / daysInM) * COL_W;

      var line       = document.createElement('div');
      line.className = 'today-line';
      line.style.left = leftPx + 'px';

      var tag        = document.createElement('span');
      tag.className  = 'today-tag';
      tag.textContent = 'TODAY';
      line.appendChild(tag);

      timelineRowsEl.appendChild(line);
    }

    /* ══ SVG connections ════════════════════════════════════════ */
    function getRelPos(el) {
      var row = el.parentElement;
      return {
        x: el.offsetLeft,
        y: row.offsetTop + el.offsetTop,
        w: el.offsetWidth,
        h: el.offsetHeight
      };
    }

    function drawConnections() {
      /* Clear, keep nothing */
      while (connSvgEl.firstChild) { connSvgEl.removeChild(connSvgEl.firstChild); }

      var totalH = projects.length * ROW_H;
      var totalW = 12 * COL_W;
      connSvgEl.setAttribute('width',  totalW);
      connSvgEl.setAttribute('height', totalH);

      connections.forEach(function (conn, idx) {
        var srcEl = timelineRowsEl.querySelector(
          '[data-proj="' + conn.from.proj + '"][data-phase="' + conn.from.phase + '"]'
        );
        var tgtEl = timelineRowsEl.querySelector(
          '[data-proj="' + conn.to.proj   + '"][data-phase="' + conn.to.phase   + '"]'
        );
        if (!srcEl || !tgtEl) return;

        var s = getRelPos(srcEl);
        var t = getRelPos(tgtEl);

        /* Connect center-right of source to center-left of target */
        var x1 = s.x + s.w,       y1 = s.y + s.h / 2;
        var x2 = t.x,              y2 = t.y + t.h / 2;

        /* Bezier control points */
        var cx = (x1 + x2) / 2;
        var d  = 'M ' + x1 + ' ' + y1 +
                 ' C ' + cx + ' ' + y1 +
                 ' '   + cx + ' ' + y2 +
                 ' '   + x2 + ' ' + y2;

        var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('class', 'conn-path');
        path.setAttribute('data-ci', idx);
        connSvgEl.appendChild(path);

        /* Endpoint dots */
        [{ x: x1, y: y1 }, { x: x2, y: y2 }].forEach(function (pt) {
          var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', pt.x);
          c.setAttribute('cy', pt.y);
          c.setAttribute('r', 3);
          c.setAttribute('class', 'conn-dot');
          c.setAttribute('data-ci', idx);
          connSvgEl.appendChild(c);
        });
      });
    }

    /* ══ Row collapse / expand ══════════════════════════════════ */
    function toggleRow(projId) {
      collapsed[projId] = !collapsed[projId];
      var row = document.getElementById('row-' + projId);
      var lbl = document.getElementById('lbl-' + projId);
      if (row) row.classList.toggle('collapsed', !!collapsed[projId]);
      if (lbl) lbl.classList.toggle('collapsed', !!collapsed[projId]);
      /* Redraw connections after layout settles */
      requestAnimationFrame(function () {
        requestAnimationFrame(drawConnections);
      });
    }

    /* ══ Filters ════════════════════════════════════════════════ */
    document.getElementById('filterBar').addEventListener('click', function (e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      var ft = btn.dataset.ft;
      var fv = btn.dataset.fv;
      document.querySelectorAll('.filter-btn[data-ft="' + ft + '"]').forEach(function (b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      filter[ft] = fv;
      applyFilter();
    });

    function applyFilter() {
      timelineRowsEl.querySelectorAll('.phase-block').forEach(function (el) {
        var ph = el.dataset.phase;
        var st = el.dataset.status;
        var ok = (filter.phase === 'all' || filter.phase === ph) &&
                 (filter.status === 'all' || filter.status === st);
        el.classList.toggle('dim', !ok);
      });
    }

    /* ══ Tooltip ════════════════════════════════════════════════ */
    var _ttTimeout;

    function showTooltip(e, projId, phaseKey) {
      clearTimeout(_ttTimeout);
      var proj  = projects.find(function (p) { return p.id === projId; });
      var phase = proj.phases.find(function (p) { return p.key === phaseKey; });
      var meta  = PHASE_META[phaseKey];

      tooltipEl.innerHTML =
        '<div class="tt-phase" style="color:' + meta.color + '">' + meta.label + '</div>' +
        '<div class="tt-proj">' + proj.name + '</div>' +
        '<div class="tt-period">' + MONTHS[phase.start] + ' &ndash; ' + MONTHS[phase.end - 1] + '</div>' +
        '<div class="tt-dels">' +
        phase.deliverables.map(function (d) {
          return '<div class="tt-del">' + d.name + '</div>';
        }).join('') +
        '</div>' +
        '<div class="tt-owner">담당: ' + phase.assignee + '</div>';

      tooltipEl.setAttribute('aria-hidden', 'false');
      tooltipEl.classList.add('show');
      positionTooltip(e);
    }

    function positionTooltip(e) {
      requestAnimationFrame(function () {
        var tw = tooltipEl.offsetWidth;
        var th = tooltipEl.offsetHeight;
        var x  = e.clientX - tw / 2;
        var y  = e.clientY - th - 12;
        if (x < 8) x = 8;
        if (x + tw > window.innerWidth - 8) x = window.innerWidth - tw - 8;
        if (y < 8) y = e.clientY + 14;
        tooltipEl.style.left = x + 'px';
        tooltipEl.style.top  = y + 'px';
      });
    }

    function hideTooltip() {
      _ttTimeout = setTimeout(function () {
        tooltipEl.classList.remove('show');
        tooltipEl.setAttribute('aria-hidden', 'true');
      }, 80);
    }

    /* ══ Side panel ═════════════════════════════════════════════ */
    function openPanel(projId, phaseKey) {
      var proj  = projects.find(function (p) { return p.id === projId; });
      var phase = proj.phases.find(function (p) { return p.key === phaseKey; });
      var meta  = PHASE_META[phaseKey];
      var statusLabels  = { done: '완료', 'in-progress': '진행 중', planned: '예정' };
      var statusClasses = { done: 'done', 'in-progress': 'progress', planned: 'planned' };

      panelTagEl.innerHTML =
        '<div class="panel-phase-tag" style="' +
        'color:' + meta.color + ';' +
        'border-color:' + meta.color + '44;' +
        'background:' + meta.color + '18' +
        '">' + meta.label + '</div>';

      /* Deliverables list */
      var delsHtml = '<p class="section-ttl">산출물</p><div class="del-list">' +
        phase.deliverables.map(function (d, i) {
          return [
            '<div class="del-item">',
            '  <div class="del-ico">' + (i + 1) + '</div>',
            '  <div>',
            '    <div class="del-name">' + d.name + '</div>',
            '    <div class="del-desc">' + d.desc + '</div>',
            '  </div>',
            '</div>'
          ].join('');
        }).join('') +
        '</div>';

      /* Assignee */
      var assigneeHtml =
        '<p class="section-ttl">담당자</p>' +
        '<div class="assignee-row">' +
        '<div class="av">' + phase.assignee[0] + '</div>' +
        phase.assignee +
        '</div>';

      /* Connections */
      var outC = connections.filter(function (c) { return c.from.proj === projId && c.from.phase === phaseKey; });
      var inC  = connections.filter(function (c) { return c.to.proj   === projId && c.to.phase   === phaseKey; });
      var connHtml = '';
      if (outC.length + inC.length > 0) {
        connHtml = '<p class="section-ttl" style="margin-top:1.1rem">의존 관계</p>';
        outC.forEach(function (c) {
          var tp = projects.find(function (p) { return p.id === c.to.proj; });
          connHtml += [
            '<div class="conn-item">',
            '  <div class="conn-dir">&#x2192;</div>',
            '  <div>',
            '    <div class="del-name">' + c.label + '</div>',
            '    <div class="del-desc">&#x2192; ' + tp.name + ' &middot; ' + PHASE_META[c.to.phase].label + '</div>',
            '  </div>',
            '</div>'
          ].join('');
        });
        inC.forEach(function (c) {
          var fp = projects.find(function (p) { return p.id === c.from.proj; });
          connHtml += [
            '<div class="conn-item">',
            '  <div class="conn-dir">&#x2190;</div>',
            '  <div>',
            '    <div class="del-name">' + c.label + '</div>',
            '    <div class="del-desc">&#x2190; ' + fp.name + ' &middot; ' + PHASE_META[c.from.phase].label + '</div>',
            '  </div>',
            '</div>'
          ].join('');
        });
      }

      panelBodyEl.innerHTML =
        '<h2 class="panel-proj">' + proj.name + '</h2>' +
        '<div class="panel-period">' +
        MONTHS[phase.start] + ' &ndash; ' + MONTHS[phase.end - 1] +
        ' &middot; ' + (phase.end - phase.start) + '개월' +
        '</div>' +
        '<span class="status-chip ' + statusClasses[phase.status] + '">' +
        statusLabels[phase.status] + '</span>' +
        delsHtml + assigneeHtml + connHtml;

      /* Active block highlight */
      timelineRowsEl.querySelectorAll('.phase-block.active').forEach(function (b) {
        b.classList.remove('active');
      });
      var ab = timelineRowsEl.querySelector(
        '[data-proj="' + projId + '"][data-phase="' + phaseKey + '"]'
      );
      if (ab) ab.classList.add('active');

      highlightConns(projId, phaseKey);

      sidePanelEl.classList.add('open');
      backdropEl.classList.add('show');
    }

    function closePanel() {
      sidePanelEl.classList.remove('open');
      backdropEl.classList.remove('show');
      timelineRowsEl.querySelectorAll('.phase-block.active').forEach(function (b) {
        b.classList.remove('active');
      });
      connSvgEl.querySelectorAll('.conn-path, .conn-dot').forEach(function (el) {
        el.classList.remove('hi');
      });
    }

    function highlightConns(projId, phaseKey) {
      connSvgEl.querySelectorAll('[data-ci]').forEach(function (el) {
        var ci   = parseInt(el.getAttribute('data-ci'), 10);
        var conn = connections[ci];
        if (!conn) return;
        var match = (conn.from.proj === projId && conn.from.phase === phaseKey) ||
                    (conn.to.proj   === projId && conn.to.phase   === phaseKey);
        el.classList.toggle('hi', match);
      });
    }

    /* ══ Scroll sync ════════════════════════════════════════════ */
    timelineScrollEl.addEventListener('scroll', function () {
      sidebarRowsEl.style.transform = 'translateY(-' + timelineScrollEl.scrollTop + 'px)';
    });

    /* ══ Event delegation ═══════════════════════════════════════ */
    document.getElementById('panelClose').addEventListener('click', closePanel);
    backdropEl.addEventListener('click', closePanel);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closePanel();
    });

    timelineRowsEl.addEventListener('click', function (e) {
      var block = e.target.closest('.phase-block');
      if (!block) return;
      openPanel(block.dataset.proj, block.dataset.phase);
    });

    /* Keyboard: open panel on Enter/Space */
    timelineRowsEl.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      var block = e.target.closest('.phase-block');
      if (!block) return;
      e.preventDefault();
      openPanel(block.dataset.proj, block.dataset.phase);
    });

    timelineRowsEl.addEventListener('mousemove', function (e) {
      var block = e.target.closest('.phase-block');
      if (!block) { hideTooltip(); return; }
      showTooltip(e, block.dataset.proj, block.dataset.phase);
    });

    timelineRowsEl.addEventListener('mouseleave', hideTooltip);

    /* ══ Init ═══════════════════════════════════════════════════ */
    function init() {
      buildRuler();
      buildSidebar();
      buildRows();
      buildTodayLine();
      /* Double rAF ensures layout is calculated before we measure positions */
      requestAnimationFrame(function () {
        requestAnimationFrame(drawConnections);
      });
    }

    init();

  }());
  </script>
</body>
</html>
